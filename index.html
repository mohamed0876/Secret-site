<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول آمن | أدخل كلمة المرور</title>
    <style>
        :root {
            --primary-pink: #F9A8D4;
            --mid-pink: #F472B6;
            --primary-purple: #A855F7;
            --dark-purple: #7C3AED;
            --error-red: #EF4444;
            --success-green: #10B981;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --input-border: #F472B6;
            --text-main: #4C1D95;
            --text-light: #8B5CF6;
            --button-text: #FFFFFF;
            --shadow-card: 0 10px 30px rgba(76, 29, 149, 0.1);
            --shadow-focus: 0 0 10px rgba(244, 114, 182, 0.5);
            --transition-smooth: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Cairo', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-pink) 0%, var(--primary-purple) 100%);
            overflow: hidden;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
            opacity: 0.6;
            animation: floatBlob 15s infinite ease-in-out;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #F9A8D4;
            top: -10%;
            left: -10%;
        }

        .blob-2 {
            width: 250px;
            height: 250px;
            background: #9333EA;
            bottom: -5%;
            right: 5%;
            animation-delay: -5s;
        }

        .decorative-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--mid-pink), transparent);
            width: 100px;
            top: 50%;
            left: 5%;
            z-index: 1;
        }

        @keyframes floatBlob {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 10px;
        }

        .lock-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);
            animation: pulseLock 2s infinite ease-in-out;
        }

        .lock-icon svg {
            fill: var(--dark-purple);
            width: 30px;
            height: 30px;
        }

        @keyframes pulseLock {
            0% { transform: scale(1); box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 4px 20px rgba(244, 114, 182, 0.4); }
            100% { transform: scale(1); box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2); }
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            padding-left: 50px;
            border-radius: 30px;
            border: 1px solid rgba(244, 114, 182, 0.3);
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            color: var(--text-main);
            transition: var(--transition-smooth);
            text-align: right;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--mid-pink);
            box-shadow: var(--shadow-focus);
        }

        .input-field::placeholder {
            color: var(--text-light);
            font-weight: 300;
        }

        .input-field.error {
            border-color: var(--error-red);
            animation: shake 0.5s ease-in-out;
        }

        .input-field.success {
            border-color: var(--success-green);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .eye-toggle {
            position: absolute;
            left: 15px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eye-toggle svg {
            fill: var(--text-light);
            width: 22px;
            height: 22px;
            transition: var(--transition-smooth);
        }

        .eye-toggle:hover svg {
            fill: var(--primary-purple);
        }

        .error-message {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 8px;
            text-align: right;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: var(--success-green);
            font-size: 14px;
            margin-top: 8px;
            text-align: right;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .success-message.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, var(--mid-pink) 0%, var(--dark-purple) 100%);
            color: var(--button-text);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(30deg) translateX(-100%);
            transition: transform 0.6s;
        }

        .submit-btn:hover::after {
            transform: rotate(30deg) translateX(100%);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                width: 85%;
            }

            .header h1 {
                font-size: 20px;
            }

            .input-field {
                padding: 12px 15px;
                font-size: 14px;
            }

            .submit-btn {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="decorative-line"></div>

    <div class="login-container">
        
        <div class="header">
            <div class="lock-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm3 8H9V6a3 3 0 0 1 6 0zM12 14a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
                </svg>
            </div>
            <h1>بحبك منونتى 🌚♥️</h1>
        </div>

        <form id="loginForm" onsubmit="return false;">
            
            <div class="form-group">
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        class="input-field" 
                        placeholder="الباسورد يا جلبى" 
                        required 
                        autocomplete="current-password"
                    >
                    
                    <button type="button" class="eye-toggle" id="eyeToggle" aria-label="إظهار/إخفاء كلمة المرور">
                        <svg viewBox="0 0 24 24" id="eyeIcon" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
                        </svg>
                    </button>
                </div>
                <div class="error-message" id="errorMessage">❌ حاول تاني</div>
                <div class="success-message" id="successMessage">✅ تمام! كلمة السر صحيحة</div>
            </div>

            <button type="submit" class="submit-btn"> دوسي هناا يجلبي ❤️
            </button>
            
        </form>

    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const eyeToggle = document.getElementById('eyeToggle');
        const eyeIcon = document.getElementById('eyeIcon');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // كلمة السر الصحيحة
        const CORRECT_PASSWORD = '3/12/2025';

        // Path for 'Eye Open' icon
        const eyeOpenPath = "M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z";
        
        // Path for 'Eye Closed' (slash) icon
        const eyeClosedPath = "M12 19c-4.97 0-9-4.03-9-9 0-2.26.83-4.33 2.21-5.91L3 2.22 4.22 1l16.78 16.78-1.22 1.22L17.7 17.1A8.953 8.953 0 0 1 12 19zm0-16c4.97 0 9 4.03 9 9 0 2.26-.83 4.33-2.21 5.91L21 21.78 19.78 23 3 6.22 4.22 5 6.3 7.1A8.953 8.953 0 0 1 12 3z";

        // إظهار/إخفاء كلمة المرور
        eyeToggle.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'password') {
                eyeIcon.querySelector('path').setAttribute('d', eyeOpenPath);
            } else {
                eyeIcon.querySelector('path').setAttribute('d', eyeClosedPath);
            }
        });

        // التحقق من كلمة المرور عند الضغط على زر الدخول
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault(); // منع إرسال النموذج
            
            const enteredPassword = passwordInput.value.trim();
            
            // إخفاء الرسائل السابقة
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            passwordInput.classList.remove('error', 'success');
            
            // التحقق من كلمة المرور
            if (enteredPassword === '') {
                // لو فاضي
                errorMessage.textContent = '❌ من فضلك أدخل كلمة المرور';
                errorMessage.classList.add('show');
                passwordInput.classList.add('error');
            } else if (enteredPassword === CORRECT_PASSWORD) {
                // ✅ لو كلمة السر صحيحة → حول للصفحة الرئيسية
                window.location.href = 'home.html';
            } else {
                // لو كلمة السر غلط
                errorMessage.textContent = '😂😂❤️ ضحكت عليك يمعلم - الباسورد الصح هو اليوم اللي عرفنا بعض فيه ❤️';
                errorMessage.classList.add('show');
                passwordInput.classList.add('error');
                
                // رج العظمة (shake) وبعدين شيل الكلاس
                setTimeout(() => {
                    passwordInput.classList.remove('error');
                }, 500);
                
                // مسح الحقل عشان يعيد المحاولة
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // إخفاء رسالة الخطأ لما المستخدم يبدأ يكتب
        passwordInput.addEventListener('input', function() {
            if (errorMessage.classList.contains('show')) {
                errorMessage.classList.remove('show');
                passwordInput.classList.remove('error');
            }
        });
    </script>

</body>
</html>
